name: Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'antora-playbook.yml'
  push:
    branches:
      - 'release-*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  check:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release-')
    runs-on: ubuntu-latest
    outputs:
      is-latest: ${{ steps.check.outputs.match }}
    steps:
      - name: Check if this is the latest release branch
        id: check
        run: |
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          LATEST_BRANCH="release-$(git ls-remote --heads https://github.com/${GITHUB_REPOSITORY}.git 'refs/heads/release-*' \
            | sed 's|.*refs/heads/release-||' \
            | sort -t. -k1,1n -k2,2n \
            | tail -1)"

          if [ "$CURRENT_BRANCH" = "$LATEST_BRANCH" ]; then
            echo "Branch $CURRENT_BRANCH is the latest release branch."
            echo "match=true" >> "$GITHUB_OUTPUT"
          else
            echo "Branch $CURRENT_BRANCH is not the latest release branch ($LATEST_BRANCH). Skipping."
            echo "match=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Antora and extensions
        run: npm i -g @antora/cli@3.1 @antora/site-generator@3.1 @antora/lunr-extension@1.0.0-alpha.13

      - name: Build site
        run: SITE_SEARCH_PROVIDER=lunr antora --fetch antora-playbook.yml

  build:
    if: needs.check.outputs.is-latest == 'true'
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Antora and extensions
        run: npm i -g @antora/cli@3.1 @antora/site-generator@3.1 @antora/lunr-extension@1.0.0-alpha.13

      - name: Build site
        run: SITE_SEARCH_PROVIDER=lunr antora --fetch antora-playbook.yml

      - name: Disable Jekyll
        run: touch build/site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
