
{{- $secureSign := .Values.trustedArtifactSigner.secureSign -}}
---
apiVersion: rhtas.redhat.com/v1alpha1
kind: Securesign
metadata:
  namespace: {{ $secureSign.namespace }}
  name: {{ $secureSign.name }}
spec:
  fulcio:
    externalAccess:
      enabled: true
    certificate:
      commonName: {{ $secureSign.fulcio.certificate.commonName }}
      organizationEmail:  {{ $secureSign.fulcio.certificate.organizationEmail }}
      organizationName: {{ $secureSign.fulcio.certificate.organizationName }}
    config:
      OIDCIssuers:
{{- $issuer := "https://kubernetes.default.svc" -}}
{{- $configmap := lookup "v1" "ConfigMap" "openshift-kube-apiserver" "config" -}}
{{- if $configmap -}}
  {{- $configYaml := index $configmap.data "config.yaml" | fromYaml -}}
  {{- $issuer = index $configYaml.apiServerArguments "service-account-issuer" | first -}}
{{- end }}
        - ClientID: sigstore
          Issuer: {{ $issuer }}
          IssuerURL: {{ $issuer }}
          Type: kubernetes
        - ClientID: {{ $issuer }}
          Issuer: {{ $issuer }}
          IssuerURL: {{ $issuer }}
          Type: kubernetes
  rekor:
    externalAccess:
      enabled: true
    rekorSearchUI:
      enabled: true
    signer:
      kms: secret
  trillian:
    database:
      create: true
  tuf:
    externalAccess:
      enabled: true
    port: 80
    keys:
      - name: rekor.pub
      - name: ctfe.pub
      - name: fulcio_v1.crt.pem
